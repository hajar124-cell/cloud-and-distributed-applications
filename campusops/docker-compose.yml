version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: campusops-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: campusops
      POSTGRES_PASSWORD: campusops_secret
      POSTGRES_DB: campusops_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U campusops"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: campusops-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://campusops:campusops_secret@postgres:5432/campusops_db
      - NODE_ENV=production
      - PORT=5000
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: campusops-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=http://backend:5000

volumes:
  postgres_data:
